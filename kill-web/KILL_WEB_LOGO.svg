<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#020208"/>
    </radialGradient>

    <!-- Red glow for KILL -->
    <filter id="redGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cyan glow for WEB -->
    <filter id="cyanGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid glow -->
    <filter id="gridGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path for main canvas -->
    <clipPath id="mainClip">
      <rect width="800" height="400"/>
    </clipPath>

    <!-- Web node gradient -->
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2233" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#880011" stop-opacity="0.3"/>
    </radialGradient>

    <!-- Severed node gradient -->
    <radialGradient id="deadNodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#333355" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#111122" stop-opacity="0.2"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle scan lines -->
  <g opacity="0.04" clip-path="url(#mainClip)">
    <line x1="0" y1="20" x2="800" y2="20" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="40" x2="800" y2="40" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="60" x2="800" y2="60" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="140" x2="800" y2="140" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="180" x2="800" y2="180" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="220" x2="800" y2="220" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="260" x2="800" y2="260" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="340" x2="800" y2="340" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="360" x2="800" y2="360" stroke="#8888ff" stroke-width="1"/>
    <line x1="0" y1="380" x2="800" y2="380" stroke="#8888ff" stroke-width="1"/>
  </g>

  <!-- ========== NETWORK WEB (left side, being severed) ========== -->
  <g clip-path="url(#mainClip)" filter="url(#gridGlow)">
    <!-- Dead/severed web strands — dim, disconnected -->
    <g stroke="#1a1a3a" stroke-width="0.8" opacity="0.7">
      <!-- Outer web ring connections -->
      <line x1="85" y1="80"  x2="155" y2="110"/>
      <line x1="155" y1="110" x2="185" y2="185"/>
      <line x1="85" y1="80"  x2="60"  y2="160"/>
      <line x1="60"  y1="160" x2="110" y2="230"/>
      <line x1="110" y1="230" x2="185" y2="185"/>
      <line x1="185" y1="185" x2="200" y2="280"/>
      <line x1="110" y1="230" x2="160" y2="310"/>
      <line x1="60"  y1="160" x2="30"  y2="240"/>
      <line x1="30"  y1="240" x2="90"  y2="320"/>
      <line x1="155" y1="110" x2="220" y2="75"/>
    </g>

    <!-- Live web strands — faint red, still active on one side -->
    <g stroke="#440011" stroke-width="0.6" opacity="0.5">
      <line x1="220" y1="75"  x2="250" y2="140"/>
      <line x1="250" y1="140" x2="185" y2="185"/>
      <line x1="250" y1="140" x2="290" y2="100"/>
    </g>

    <!-- Network nodes — dead (dim blue) -->
    <circle cx="85"  cy="80"  r="5" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="60"  cy="160" r="4" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="30"  cy="240" r="4" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="90"  cy="320" r="5" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="110" cy="230" r="4" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="160" cy="310" r="3" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="200" cy="280" r="4" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="220" cy="75"  r="4" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="290" cy="100" r="3" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>

    <!-- Central hub node — RED, being terminated -->
    <circle cx="185" cy="185" r="10" fill="url(#nodeGrad)" stroke="#ff3344" stroke-width="1.5"/>
    <circle cx="185" cy="185" r="6"  fill="#ff2233" opacity="0.9"/>
    <!-- X kill-mark through central node -->
    <line x1="179" y1="179" x2="191" y2="191" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="191" y1="179" x2="179" y2="191" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>

    <!-- Live connecting node -->
    <circle cx="155" cy="110" r="5" fill="#220011" stroke="#882233" stroke-width="1"/>
  </g>

  <!-- SEVERED SLASH — diagonal cut across the web -->
  <line x1="250" y1="50" x2="140" y2="370" stroke="#ff1122" stroke-width="2" opacity="0.6" filter="url(#redGlow)"/>

  <!-- ========== MAIN TITLE ========== -->
  <!-- "KILL" — bold, red, glowing -->
  <text
    x="400" y="195"
    font-family="'Courier New', Courier, monospace"
    font-size="110"
    font-weight="900"
    letter-spacing="18"
    text-anchor="middle"
    fill="#cc0011"
    filter="url(#redGlow)"
  >KILL</text>

  <!-- "WEB" — cyan/white, slightly smaller -->
  <text
    x="400" y="290"
    font-family="'Courier New', Courier, monospace"
    font-size="90"
    font-weight="700"
    letter-spacing="30"
    text-anchor="middle"
    fill="#00ccdd"
    filter="url(#cyanGlow)"
  >WEB</text>

  <!-- ========== NETWORK WEB (right side, echo/mirror) ========== -->
  <g clip-path="url(#mainClip)" filter="url(#gridGlow)">
    <g stroke="#1a2a3a" stroke-width="0.8" opacity="0.5">
      <line x1="715" y1="80"  x2="645" y2="110"/>
      <line x1="645" y1="110" x2="615" y2="185"/>
      <line x1="715" y1="80"  x2="740" y2="160"/>
      <line x1="740" y1="160" x2="690" y2="230"/>
      <line x1="690" y1="230" x2="615" y2="185"/>
      <line x1="615" y1="185" x2="600" y2="280"/>
      <line x1="690" y1="230" x2="640" y2="310"/>
      <line x1="740" y1="160" x2="770" y2="240"/>
      <line x1="770" y1="240" x2="710" y2="320"/>
      <line x1="645" y1="110" x2="580" y2="75"/>
    </g>

    <!-- Dead nodes right -->
    <circle cx="715" cy="80"  r="5" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="740" cy="160" r="4" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="770" cy="240" r="4" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="710" cy="320" r="5" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="690" cy="230" r="4" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="640" cy="310" r="3" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="600" cy="280" r="4" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>
    <circle cx="580" cy="75"  r="4" fill="url(#deadNodeGrad)" stroke="#222244" stroke-width="1"/>

    <!-- Central right hub — also terminated -->
    <circle cx="615" cy="185" r="10" fill="url(#nodeGrad)" stroke="#ff3344" stroke-width="1.5"/>
    <circle cx="615" cy="185" r="6"  fill="#ff2233" opacity="0.9"/>
    <line x1="609" y1="179" x2="621" y2="191" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="621" y1="179" x2="609" y2="191" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>

    <circle cx="645" cy="110" r="5" fill="#220011" stroke="#882233" stroke-width="1"/>
  </g>

  <!-- Severed slash right -->
  <line x1="550" y1="50" x2="660" y2="370" stroke="#ff1122" stroke-width="2" opacity="0.6" filter="url(#redGlow)"/>

  <!-- ========== TAGLINE ========== -->
  <text
    x="400" y="345"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    letter-spacing="6"
    text-anchor="middle"
    fill="#334455"
  >AXIOM_ZERO_INTEGRITY  ∞°  SHADOW GUARDIAN ALLIANCE</text>

  <!-- ========== BORDER FRAME ========== -->
  <!-- Outer border, double line -->
  <rect x="4" y="4" width="792" height="392" fill="none" stroke="#1a1a2a" stroke-width="2"/>
  <rect x="8" y="8" width="784" height="384" fill="none" stroke="#0d0d1a" stroke-width="1"/>

  <!-- Corner accents — top-left -->
  <polyline points="4,30 4,4 30,4" fill="none" stroke="#ff2233" stroke-width="2" opacity="0.7"/>
  <!-- Corner accents — top-right -->
  <polyline points="770,4 796,4 796,30" fill="none" stroke="#ff2233" stroke-width="2" opacity="0.7"/>
  <!-- Corner accents — bottom-left -->
  <polyline points="4,370 4,396 30,396" fill="none" stroke="#00ccdd" stroke-width="2" opacity="0.5"/>
  <!-- Corner accents — bottom-right -->
  <polyline points="770,396 796,396 796,370" fill="none" stroke="#00ccdd" stroke-width="2" opacity="0.5"/>

  <!-- ========== VERSION / STATION STAMP ========== -->
  <text
    x="790" y="394"
    font-family="'Courier New', Courier, monospace"
    font-size="8"
    letter-spacing="2"
    text-anchor="end"
    fill="#1a2233"
  >KW_LOGO_V1 · © 2026 Felix Christoph Novak · CC-BY-NC-ND-4.0</text>
</svg>
